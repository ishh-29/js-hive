<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="editor-theme.css">
    <link rel="stylesheet" href="img-editor.css">
</head>

<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                    <button class="btn" id="reset-btn">Reset</button>
                    <button class="btn" id="download-btn">Download</button>
                </div>
                <div class="bottom">
                    <div class="placeholder">
                        <i class="ri-image-line"></i>
                        <p>Click to choose image</p>
                    </div>
                    <canvas id="img"></canvas>
                    <input type="file" id="img-input" accept="image/*" hidden>
                </div>
            </div>
            <div class="right">
                <h2>Filters</h2>
                <div class="filters">
                </div>
            </div>
        </section>
    </main>
    <script src="img-editor.js"></script>
</body>

</html>
